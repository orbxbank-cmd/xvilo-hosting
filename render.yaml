services:
  - type: web
    name: xvilo-hosting
    runtime: static
    repo: https://github.com/orbxbank-cmd/xvilo-hosting
    branch: main
    staticPublishPath: public
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
